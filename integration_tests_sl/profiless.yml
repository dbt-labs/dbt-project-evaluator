
# HEY! This file is used in the integration tests with CI.
# You should __NEVER__ check credentials into version control. Thanks for reading :)


integration_tests:
  target: postgres
  outputs:
    postgres:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'user') }}"
      pass: "{{ env_var('DBT_ENV_SECRET_POSTGRES_PASS', 'pass') }}"
      port: "{{ env_var('POSTGRES_PORT', 5432) | as_number }}"
      dbname: "{{ env_var('POSTGRES_DATABASE', 'postgres') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA', 'dbt_project_evaluator_integration_tests_postgres') }}"
      threads: 5

    redshift:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST', 'localhost') }}"
      user: "{{ env_var('REDSHIFT_USER', 'user') }}"
      pass: "{{ env_var('DBT_ENV_SECRET_REDSHIFT_PASS', 'pass') }}"
      dbname: "{{ env_var('REDSHIFT_DATABASE', 'postgres') }}"
      port: "{{ env_var('REDSHIFT_PORT', 5439) | as_number }}"
      schema: "{{ env_var('REDSHIFT_SCHEMA', 'dbt_project_evaluator_integration_tests_redshift') }}"
      threads: 5

    bigquery:
      type: bigquery
      method: service-account-json
      keyfile_json: "{{ env_var('BIGQUERY_KEYFILE_JSON', 'keyfile.json') | as_native }}"
      project: "{{ env_var('BIGQUERY_PROJECT', 'project') }}"
      dataset: "{{ env_var('BIGQUERY_SCHEMA', 'dbt_project_evaluator_integration_tests_bigquery') }}"
      threads: 10

    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'account') }}"
      user: "{{ env_var('SNOWFLAKE_USER', 'user') }}"
      password: "{{ env_var('DBT_ENV_SECRET_SNOWFLAKE_PASS', 'pass') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'role') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'database') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'warehouse') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'dbt_project_evaluator_integration_tests_snowflake') }}"
      threads: 10

    databricks:
      type: databricks
      schema: "{{ env_var('DATABRICKS_SCHEMA', 'dbt_project_evaluator_integration_tests_databricks') }}"
      host: "{{ env_var('DATABRICKS_HOST', 'localhost') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', 'http_path') }}"
      token: "{{ env_var('DBT_ENV_SECRET_DATABRICKS_TOKEN', 'token') }}"
      threads: 10

    duckdb:
      type: duckdb
      path: ./duck.db

    trino:
      type: trino
      host: "{{ env_var('TRINO_TEST_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_TEST_PORT', 8080) | as_number }}"
      method: ldap
      user: "{{ env_var('TRINO_TEST_USER', 'user') }}"
      password: "{{ env_var('TRINO_TEST_PASS', 'pass') }}"
      catalog: "{{ env_var('TRINO_TEST_CATALOG_NAME', 'catalog') }}"
      schema: dbt_project_evaluator_integration_tests_trino
      threads: 5
      session_properties:
        query_max_stage_count: 275

    clickhouse:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_TEST_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_TEST_PORT', 9000) | as_number }}"
      user: "{{ env_var('CLICKHOUSE_TEST_USER', 'user') }}"
      password: "{{ env_var('CLICKHOUSE_TEST_PASS', 'pass') }}"
      dbname: "{{ env_var('CLICKHOUSE_TEST_DBNAME', 'dbname') }}"
      schema: dbt_project_evaluator_integration_tests_clickhouse
      threads: 5
